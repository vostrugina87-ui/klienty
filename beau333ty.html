<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бьюти Учет Клиентов</title>
    <style>
        /* Полная адаптация под мобильный экран */
        body {
            background-color: #f5f6fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .phone-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 15px;
        }
        h1 { font-size: 22px; font-weight: bold; color: #6c5ce7; margin: 0; }
        .nav-btn {
            background: #fff; border: 1px solid #6c5ce7; color: #6c5ce7;
            padding: 10px 16px; border-radius: 24px; font-size: 14px; font-weight: bold; cursor: pointer;
            min-height: 44px; display: flex; align-items: center;
        }
        .form { display: flex; flex-direction: column; margin-bottom: 20px; }
        input {
            background-color: #fff; padding: 14px; border-radius: 10px;
            margin-bottom: 12px; border: 1px solid #dcdde1; font-size: 16px; outline: none;
            min-height: 48px; box-sizing: border-box;
        }
        input:focus { border-color: #6c5ce7; }
        .submit-btn {
            background-color: #6c5ce7; color: #fff; padding: 14px;
            border: none; border-radius: 10px; font-size: 16px; font-weight: bold; 
            min-height: 50px; cursor: pointer;
        }
        .calendar-section { background: #fff; padding: 14px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; margin-top: 12px; }
        .calendar-day-name { font-size: 12px; font-weight: bold; color: #7f8c8d; padding-bottom: 4px; }
        .calendar-cell { 
            padding: 12px 0; font-size: 15px; border-radius: 8px; cursor: pointer; 
            position: relative; font-weight: 600; min-height: 44px; box-sizing: border-box;
        }
        .calendar-cell.active-day { background: #6c5ce7 !important; color: #fff !important; }
        .has-event::after {
            content: ''; position: absolute; bottom: 4px; left: 50%;
            transform: translateX(-50%); width: 5px; height: 5px; background-color: #ff4757; border-radius: 50%;
        }
        .client-list { flex: 1; }
        .section-title { font-size: 14px; font-weight: bold; color: #7f8c8d; margin-bottom: 12px; }
        .card {
            background-color: #fff; padding: 16px; margin-bottom: 12px;
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        .client-info h3 { margin: 0; font-size: 18px; color: #2f3640; }
        .client-info p { margin: 5px 0 0 0; font-size: 14px; color: #7f8c8d; }
        .date-badge { font-size: 12px; color: #6c5ce7; font-weight: 600; margin-top: 6px; display: block; }
        .client-meta { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
        .price { font-size: 17px; font-weight: bold; color: #2f3640; margin-bottom: 10px; }
        .delete-btn { 
            background: #ffeae6; border: none; color: #ff4757; cursor: pointer; 
            font-weight: bold; padding: 8px 14px; border-radius: 8px; font-size: 13px; min-height: 36px;
        }
    </style>
</head>
<body>
    <div class="phone-wrapper">
        <div class="app-container">
            
            <!-- Мобильная шапка -->
            <div class="header-bar">
                <button id="backBtn" class="nav-btn" style="display: none;" onclick="switchScreen('main')">← Назад</button>
                <h1 id="screenTitle">Бьюти Учет</h1>
                <button id="calBtn" class="nav-btn" onclick="switchScreen('calendar')">📅 Календарь</button>
            </div>

            <!-- ЭКРАН 1: Форма добавления -->
            <div id="mainScreen">
                <div class="form">
                    <input type="text" id="nameInput" placeholder="Имя клиента">
                    <input type="text" id="serviceInput" placeholder="Услуга (н-р: Стрижка)">
                    <input type="number" id="priceInput" placeholder="Стоимость (руб)">
                    <input type="datetime-local" id="dateInput">
                    <button class="submit-btn" onclick="addClient()">Добавить запись</button>
                </div>
                <div class="section-title">Все предстоящие записи:</div>
            </div>

            <!-- ЭКРАН 2: Мобильный Календарь -->
            <div id="calendarScreen" style="display: none;">
                <div class="calendar-section">
                    <div style="text-align: center; font-weight: bold; font-size: 16px;" id="monthYearLabel"></div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>
                <div class="section-title" id="filterTitle">Выберите день</div>
            </div>

            <!-- Список клиентов -->
            <div class="client-list" id="clientList"></div>

        </div>
    </div>
    <script>
        // Загрузка данных из локальной памяти браузера
        let clients = JSON.parse(localStorage.getItem('beauty_calendar_crm_v3')) || [];
        let currentScreen = 'main';
        let selectedFilterDate = null;
        
        // КРИТИЧЕСКОЕ ИСПРАВЛЕНИЕ: Теперь берется реальная текущая дата и свободно меняется
        let displayDate = new Date(); 

        function formatDate(dateString) {
            if (!dateString) return '';
            return new Date(dateString).toLocaleDateString('ru-RU', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        // Переключение между экранами
        function switchScreen(screen) {
            currentScreen = screen;
            if (screen === 'main') {
                document.getElementById('mainScreen').style.display = 'block';
                document.getElementById('calendarScreen').style.display = 'none';
                document.getElementById('backBtn').style.display = 'none';
                document.getElementById('calBtn').style.display = 'block';
                document.getElementById('screenTitle').innerText = 'Бьюти Учет';
                selectedFilterDate = null;
            } else {
                document.getElementById('mainScreen').style.display = 'none';
                document.getElementById('calendarScreen').style.display = 'block';
                document.getElementById('backBtn').style.display = 'block';
                document.getElementById('calBtn').style.display = 'none';
                document.getElementById('screenTitle').innerText = 'Расписание';
                generateCalendarGrid();
            }
            renderClients();
        }

        // Отрисовка списка клиентов
        function renderClients() {
            const listContainer = document.getElementById('clientList');
            listContainer.innerHTML = '';

            let filtered = [...clients];
            if (currentScreen === 'calendar' && selectedFilterDate) {
                filtered = clients.filter(c => c.date.startsWith(selectedFilterDate));
                const formattedDay = new Date(selectedFilterDate).toLocaleDateString('ru-RU', {day: 'numeric', month: 'long'});
                document.getElementById('filterTitle').innerText = `Записи на ${formattedDay}:`;
            } else if (currentScreen === 'calendar') {
                document.getElementById('filterTitle').innerText = `Выберите день на календаре`;
                return;
            }

            // Сортировка по времени
            filtered.sort((a, b) => new Date(a.date) - new Date(b.date));

            if (filtered.length === 0 && currentScreen === 'calendar') {
                listContainer.innerHTML = '<div style="text-align:center; color:#7f8c8d; margin-top:20px;">На этот день записей нет</div>';
                return;
            }

            filtered.forEach(item => {
                listContainer.innerHTML += `
                    <div class="card">
                        <div class="client-info">
                            <h3>${item.name}</h3>
                            <p>${item.service}</p>
                            <span class="date-badge">📅 ${formatDate(item.date)}</span>
                        </div>
                        <div class="client-meta">
                            <span class="price">${item.price} ₽</span>
                            <button class="delete-btn" onclick="deleteClient('${item.id}')">Удалить</button>
                        </div>
                    </div>`;
            });
        }

        // Функция изменения месяца (вперед / назад)
        function changeMonth(direction) {
            displayDate.setMonth(displayDate.getMonth() + direction);
            generateCalendarGrid();
            renderClients();
        }

        // Генерация интерактивного бесконечного календаря
        function generateCalendarGrid() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();

            // Создаем красивую шапку месяца с кнопками-стрелками для перелистывания
            const monthText = displayDate.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' }).toUpperCase();
            document.getElementById('monthYearLabel').innerHTML = `
                <span onclick="changeMonth(-1)" style="cursor:pointer; padding: 0 15px; font-size:20px; color:#6c5ce7;">‹</span>
                <span>${monthText}</span>
                <span onclick="changeMonth(1)" style="cursor:pointer; padding: 0 15px; font-size:20px; color:#6c5ce7;">›</span>
            `;

            const daysNames = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            daysNames.forEach(d => grid.innerHTML += `<div class="calendar-day-name">${d}</div>`);

            let firstDayIndex = new Date(year, month, 1).getDay() - 1;
            if (firstDayIndex === -1) firstDayIndex = 6;

            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) grid.innerHTML += '<div></div>';

            for (let day = 1; day <= totalDays; day++) {
                const dayString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const hasBooking = clients.some(c => c.date.startsWith(dayString));
                const isSelected = selectedFilterDate === dayString ? 'active-day' : '';
                const eventClass = hasBooking ? 'has-event' : '';

                grid.innerHTML += `<div class="calendar-cell ${isSelected} ${eventClass}" onclick="selectCalendarDay('${dateString}')" data-date="${dayString}">${day}</div>`;
            }
            
            // Исправление вызова клика
            const cells = grid.querySelectorAll('.calendar-cell');
            cells.forEach(cell => {
                cell.addEventListener('click', function() {
                    selectCalendarDay(this.getAttribute('data-date'));
                });
            });
        }

        function selectCalendarDay(dateStr) {
            selectedFilterDate = dateStr;
            generateCalendarGrid();
            renderClients();
        }

        function addClient() {
            const nameInput = document.getElementById('nameInput');
            const serviceInput = document.getElementById('serviceInput');
            const priceInput = document.getElementById('priceInput');
            const dateInput = document.getElementById('dateInput');

            if (!nameInput.value || !serviceInput.value || !priceInput.value || !dateInput.value) {
                alert('Заполните все поля!');
                return;
            }

            const newClient = {
                id: Date.now().toString(),
                name: nameInput.value.trim(),
                service: serviceInput.value.trim(),
                price: priceInput.value.trim(),
                date: dateInput.value
            };

            clients.push(newClient);
            localStorage.setItem('beauty_calendar_crm_v3', JSON.stringify(clients));
            nameInput.value = ''; serviceInput.value = ''; priceInput.value = ''; dateInput.value = '';
            renderClients();
        }

        function deleteClient(id) {
            if (confirm('Удалить эту запись?')) {
                clients = clients.filter(c => c.id !== id);
                localStorage.setItem('beauty_calendar_crm_v3', JSON.stringify(clients));
                if (currentScreen === 'calendar') generateCalendarGrid();
                renderClients();
            }
        }

        renderClients();
    </script>
</body>
</html>
